<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>킴스클럽 매장 점검</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#F2F1EE;color:#1A1A1A;min-height:100vh;-webkit-tap-highlight-color:transparent}
header{background:#1A2535;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200}
.logo{font-size:16px;font-weight:900;color:#D0021B;letter-spacing:1px;cursor:pointer}
.logo span{color:#FFF}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-info{font-size:11px;color:#8A9BB0;text-align:right}
.hdr-info strong{color:#FFF;display:block;font-size:12px}
.hdr-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#8A9BB0;font-size:11px;padding:5px 9px;cursor:pointer;font-family:inherit;white-space:nowrap}
.hdr-btn:hover{color:#FFF}
.hdr-btn.active{background:rgba(255,255,255,0.15);color:#FFF}
.progress-wrap{background:#1A2535;padding:8px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:#8A9BB0;margin-bottom:5px}
.progress-bar-bg{height:4px;background:#2C3E55;border-radius:2px}
.progress-bar-fill{height:100%;background:#D0021B;border-radius:2px;transition:width 0.4s ease}
main{max-width:720px;margin:0 auto;padding:16px 14px 90px}
.step-tag{font-size:11px;font-weight:700;color:#D0021B;letter-spacing:1px;margin-bottom:4px}
.step-title{font-size:20px;font-weight:900;color:#1A1A1A;margin-bottom:4px}
.step-sub{font-size:13px;color:#555;margin-bottom:20px}
.meta-row{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.meta-field label{display:block;font-size:11px;font-weight:700;color:#444;margin-bottom:5px}
.meta-field input{width:100%;max-width:100%;height:40px;background:#FFF;border:1px solid #D0CFC9;border-radius:8px;padding:0 12px;font-family:inherit;font-size:14px;color:#1A1A1A;outline:none;-webkit-appearance:none;appearance:none}
.meta-field input:focus{border-color:#D0021B}
.sec-label{font-size:12px;font-weight:700;color:#1A2535;letter-spacing:0.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1A2535;display:flex;align-items:center;gap:6px}
.sec-tag{font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;color:#FFF}
.sec-tag.am{background:#1A2535}
.sec-tag.pm{background:#2E4A7A}
.part-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.part-card{background:#FFF;border:1.5px solid #E0DFD9;border-radius:12px;padding:14px 12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:10px}
.part-card:hover{border-color:#aaa}
.part-card.selected{border-color:#D0021B;background:#FFF5F5}
.part-card.full{grid-column:1/-1}
.part-card.submitted{border-color:#27AE60;background:#F4FCF7}
.part-icon{font-size:24px;line-height:1;flex-shrink:0}
.part-name{font-size:14px;font-weight:700;color:#1A1A1A}
.part-sub{font-size:11px;color:#777;margin-top:2px}
.part-count{margin-left:auto;background:#F0EFE9;font-size:11px;color:#555;border-radius:20px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.part-card.selected .part-count{background:#D0021B;color:#FFF}
.sbadge{display:inline-block;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;margin-top:5px}
.sbadge.done{background:#EAF8F0;color:#1E8449}
.sbadge.undone{background:#FEF5E4;color:#B7770D}
.eve-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.eve-card{background:#FFF;border:1.5px solid #E0DFD9;border-radius:12px;padding:18px 14px;cursor:pointer;transition:all 0.15s;text-align:center;position:relative}
.eve-card:hover{border-color:#aaa}
.eve-card.selected{border-color:#2E4A7A;background:#F0F4FC}
.eve-card.submitted{border-color:#2E4A7A;background:#E8EEF9}
.eve-dept-icon{font-size:38px;display:block;margin-bottom:8px}
.eve-dept-name{font-size:14px;font-weight:700;color:#1A1A1A;margin-bottom:4px}
.eve-photo-count{font-size:11px;color:#888}
.eve-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.eve-badge.done{background:#E8EEF9;color:#2E4A7A}
.eve-badge.undone{background:#FEF5E4;color:#B7770D}
.cat-section{margin-bottom:20px}
.cat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #1A2535}
.cat-hdr-icon{font-size:18px}
.cat-hdr-name{font-size:15px;font-weight:900;color:#1A2535}
.cat-hdr-cnt{font-size:11px;color:#888;margin-left:auto}
.check-item{background:#FFF;border:1px solid #E8E7E2;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid #E8E7E2;transition:border-left-color 0.2s}
.check-item.st-good{border-left-color:#27AE60}
.check-item.st-warn{border-left-color:#F39C12}
.check-item.st-bad{border-left-color:#E74C3C}
.check-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.check-num{font-size:11px;font-weight:700;color:#AAA;min-width:18px;padding-top:2px;flex-shrink:0}
.check-text{font-size:14px;font-weight:500;color:#1A1A1A;flex:1;line-height:1.5}
.btn-group{display:flex;gap:6px}
.bst{flex:1;padding:9px 0;border-radius:7px;border:1.5px solid #E0DFD9;background:#F8F7F4;font-family:inherit;font-size:13px;font-weight:700;color:#666;cursor:pointer;transition:all 0.15s}
.bst:active{transform:scale(0.97)}
.bst.sel-good{background:#EAF8F0;border-color:#27AE60;color:#1E8449}
.bst.sel-warn{background:#FEF5E4;border-color:#F39C12;color:#B7770D}
.bst.sel-bad{background:#FDECEA;border-color:#E74C3C;color:#C0392B}
.memo-btn{max-width:42px;font-size:16px}
.memo-area{display:none;margin-top:8px;width:100%;background:#F8F7F4;border:1px solid #E0DFD9;border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;color:#1A1A1A;resize:none;outline:none;line-height:1.5}
.memo-area.show{display:block}
.memo-area:focus{border-color:#D0021B}
.eve-upload-section{margin-bottom:16px}
.eve-upload-hdr{background:#1A2535;border-radius:12px 12px 0 0;padding:14px 16px;display:flex;align-items:center;gap:10px}
.eve-upload-dept-icon{font-size:28px}
.eve-upload-dept-name{font-size:15px;font-weight:700;color:#FFF}
.eve-upload-desc{font-size:11px;color:#8A9BB0;margin-top:2px}
.eve-upload-body{background:#FFF;border:1px solid #E8E7E2;border-top:none;border-radius:0 0 12px 12px;padding:14px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.photo-slot{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#F2F1EE;border:1.5px dashed #D0CFC9;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center}
.photo-slot:hover{border-color:#2E4A7A}
.photo-slot.filled{border:none;cursor:default}
.photo-slot img{width:100%;height:100%;object-fit:cover;display:block}
.photo-slot-lbl{font-size:10px;color:#bbb;margin-top:4px}
.photo-add-icon{font-size:26px;color:#ccc}
.photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;color:#FFF;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-cnt-info{font-size:12px;color:#888;text-align:center;margin-bottom:10px}
.eve-note-lbl{font-size:11px;font-weight:700;color:#444;margin-bottom:5px}
.eve-note-ta{width:100%;background:#F8F7F4;border:1px solid #E0DFD9;border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;color:#1A1A1A;resize:none;outline:none;line-height:1.5}
.eve-note-ta:focus{border-color:#2E4A7A}
.hidden-input{display:none}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#1A2535;border-top:1px solid rgba(255,255,255,0.1);padding:12px 16px;z-index:100}
.bottom-inner{max-width:720px;margin:0 auto;display:flex;gap:10px}
.btn-main{flex:1;padding:14px;background:#D0021B;color:#FFF;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s}
.btn-main.eve{background:#2E4A7A}
.btn-main:disabled{background:#555;cursor:not-allowed}
.btn-main:not(:disabled):active{opacity:0.85}
.btn-sub{padding:14px 18px;background:transparent;color:#CCC;border:1px solid rgba(255,255,255,0.2);border-radius:10px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
.btn-sub:hover{color:#FFF}
.rpt-card{background:#FFF;border:1px solid #E8E7E2;border-radius:12px;padding:18px;margin-bottom:12px}
.rpt-card-title{font-size:14px;font-weight:700;color:#1A1A1A;margin-bottom:12px}
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.ov-cell{background:#F8F7F4;border-radius:8px;padding:12px 8px;text-align:center}
.ov-val{font-size:28px;font-weight:900}
.ov-val.good{color:#1E8449}.ov-val.warn{color:#B7770D}.ov-val.bad{color:#C0392B}
.ov-label{font-size:11px;color:#888;margin-top:3px}
.score-disp{text-align:center;padding:8px 0 14px}
.score-num{font-size:52px;font-weight:900;line-height:1}
.score-grade{font-size:13px;color:#555;margin-top:4px}
.cs-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cs-name{font-size:13px;font-weight:700;color:#1A1A1A;width:60px;flex-shrink:0}
.cs-bar-bg{flex:1;height:8px;background:#F0EFE9;border-radius:4px;overflow:hidden}
.cs-bar-fill{height:100%;border-radius:4px}
.cs-val{font-size:12px;font-weight:700;color:#1A1A1A;width:35px;text-align:right}
.issue-list{list-style:none}
.issue-list li{padding:10px 12px;background:#FEF0EF;border-left:3px solid #E74C3C;border-radius:0 8px 8px 0;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px}
.issue-tag{font-size:10px;font-weight:700;background:#E74C3C;color:#FFF;padding:2px 6px;border-radius:4px;white-space:nowrap;margin-top:1px;flex-shrink:0}
.issue-text{font-size:13px;color:#1A1A1A;flex:1}
.issue-memo{font-size:11px;color:#777;margin-top:3px}
.all-good{text-align:center;padding:20px}
.all-good-icon{font-size:40px;margin-bottom:8px}
.all-good-text{font-size:16px;font-weight:700;color:#1E8449;margin-bottom:4px}
.all-good-sub{font-size:13px;color:#888}
.submit-box{border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;display:none}
.submit-box.loading{display:block;background:#F0EFE9;border:1px solid #ccc}
.submit-box.ok{display:block;background:#EAF8F0;border:1px solid #27AE60}
.submit-box.err{display:block;background:#FDECEA;border:1px solid #E74C3C}
.submit-icon{font-size:32px;margin-bottom:8px}
.submit-msg{font-size:14px;font-weight:700;color:#1A1A1A;margin-bottom:4px}
.submit-sub{font-size:12px;color:#888}
/* loading screen */
.loading-screen{text-align:center;padding:80px 20px}
.loading-spinner{width:36px;height:36px;border:3px solid #E0DFD9;border-top-color:#D0021B;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:#888}
/* records */
.rec-empty{text-align:center;padding:60px 20px;color:#aaa}
.rec-empty-icon{font-size:40px;margin-bottom:12px}
.rec-date-group{margin-bottom:20px}
.rec-date-hdr{font-size:12px;font-weight:700;color:#888;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #E8E7E2}
.rec-item{background:#FFF;border:1px solid #E8E7E2;border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color 0.15s}
.rec-item:hover{border-color:#aaa}
.rec-item-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.rec-item-icon.am{background:#F0EFE9}
.rec-item-icon.pm{background:#E8EEF9}
.rec-item-body{flex:1;min-width:0}
.rec-item-title{font-size:14px;font-weight:700;color:#1A1A1A;margin-bottom:3px}
.rec-item-sub{font-size:12px;color:#888}
.rec-item-score{font-size:16px;font-weight:900;flex-shrink:0}
.rec-item-score.good{color:#1E8449}
.rec-item-score.warn{color:#B7770D}
.rec-item-score.bad{color:#C0392B}
.rec-item-arrow{font-size:16px;color:#ccc;flex-shrink:0}
.det-hdr{background:#FFF;border:1px solid #E8E7E2;border-radius:12px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.det-hdr-icon{font-size:32px}
.det-hdr-info{flex:1}
.det-hdr-title{font-size:16px;font-weight:700;color:#1A1A1A;margin-bottom:2px}
.det-hdr-sub{font-size:12px;color:#888}
.det-score{font-size:28px;font-weight:900}
.det-check-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F0F0F0}
.det-check-row:last-child{border-bottom:none}
.det-check-num{font-size:11px;color:#aaa;min-width:20px;padding-top:2px;flex-shrink:0;font-weight:700}
.det-check-q{font-size:13px;color:#1A1A1A;flex:1;line-height:1.5}
.det-check-ans{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.ans-good{background:#EAF8F0;color:#1E8449}
.ans-warn{background:#FEF5E4;color:#B7770D}
.ans-bad{background:#FDECEA;color:#C0392B}
.ans-na{background:#F0F0F0;color:#888}
.det-check-memo{font-size:11px;color:#888;margin-top:3px;padding-left:30px}
.photo-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.photo-gallery-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer}
.photo-gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:flex;align-items:center;justify-content:center}
.lightbox img{max-width:100%;max-height:100vh;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:#FFF;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#FFF;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-prev{left:12px}
.lightbox-next{right:12px}
.lightbox-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:13px}
/* admin */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto}
.adm-panel{background:#FFF;width:100%;max-width:720px;min-height:100vh;padding-bottom:80px}
.adm-hdr{background:#1A2535;padding:16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.adm-title{font-size:16px;font-weight:700;color:#FFF;flex:1}
.adm-close{background:transparent;border:1px solid rgba(255,255,255,0.3);border-radius:6px;color:#CCC;font-size:13px;padding:6px 14px;cursor:pointer;font-family:inherit}
.adm-body{padding:16px}
.adm-sec-title{font-size:13px;font-weight:700;color:#1A2535;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1A2535}
.adm-cat{background:#F8F7F4;border-radius:10px;padding:12px;margin-bottom:10px}
.adm-cat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.adm-cat-name{font-size:14px;font-weight:700;color:#1A1A1A}
.adm-item-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.adm-item-input{flex:1;height:38px;background:#FFF;border:1px solid #D0CFC9;border-radius:7px;padding:0 10px;font-family:inherit;font-size:13px;color:#1A1A1A;outline:none}
.adm-item-input:focus{border-color:#D0021B}
.btn-del{width:34px;height:34px;background:#FDECEA;border:none;border-radius:7px;color:#C0392B;font-size:16px;cursor:pointer;flex-shrink:0}
.btn-add-item{width:100%;height:36px;background:#FFF;border:1.5px dashed #ccc;border-radius:7px;color:#888;font-family:inherit;font-size:13px;cursor:pointer;margin-top:4px}
.btn-add-item:hover{border-color:#D0021B;color:#D0021B}
.adm-save-bar{position:fixed;bottom:0;left:0;right:0;background:#1A2535;padding:12px 16px;z-index:310}
.btn-adm-save{width:100%;max-width:720px;margin:0 auto;display:block;height:48px;background:#D0021B;color:#FFF;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.pwd-screen{display:flex;flex-direction:column;align-items:center;padding:60px 24px;gap:16px}
.pwd-title{font-size:18px;font-weight:700;color:#1A1A1A}
.pwd-sub{font-size:13px;color:#888;text-align:center}
.pwd-input{width:100%;max-width:260px;height:44px;border:1.5px solid #D0CFC9;border-radius:10px;text-align:center;font-size:20px;letter-spacing:4px;outline:none;font-family:inherit;color:#1A1A1A}
.pwd-input:focus{border-color:#D0021B}
.btn-pwd{width:100%;max-width:260px;height:44px;background:#D0021B;color:#FFF;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.pwd-err{font-size:13px;color:#C0392B;display:none}
.pwd-err.show{display:block}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="goHome()">KIM'S <span>CLUB</span></div>
  <div class="hdr-right">
    <div class="hdr-info" id="hdrInfo"><strong>매장 점검</strong>야탑점</div>
    <button class="hdr-btn" id="recBtn" onclick="goRecords()">📋 기록</button>
    <button class="hdr-btn" onclick="openAdmin()">⚙</button>
  </div>
</header>
<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-meta"><span id="progressLabel">0/0</span><span id="progressPct">0%</span></div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
</div>
<main id="mainArea"></main>
<div class="bottom-bar" id="bottomBar" style="display:none">
  <div class="bottom-inner" id="bottomInner"></div>
</div>
<div class="overlay" id="adminOverlay" style="display:none">
  <div class="adm-panel" id="adminPanel"></div>
</div>
<div class="lightbox" id="lightbox" style="display:none">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lbPrev()">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="lbNext()">›</button>
  <div class="lightbox-counter" id="lbCounter"></div>
</div>

<script>
/* ══════════════════════════════════
   CONFIG
══════════════════════════════════ */
function getSheetUrl() {
  return 'https://script.google.com/macros/s/AKfycbzcBeQ6O-TbQgthrVGvAQcEpDhjM8jOz3jpY68Mp7NBlnOZ1qEpF2YkFGwagkC9hB8G/exec';
}
const MIN_PHOTOS=3, MAX_PHOTOS=5;

/* ══════════════════════════════════
   STATIC DATA
══════════════════════════════════ */

/* ══════════════════════════════════
   SHARED STATE (server-side)
══════════════════════════════════ */
let sharedState = {
  submissions: {},  // {date: {morning: {partId: true}, evening: {deptId: true}}}
  loaded: false,
};
let CATS = JSON.parse(JSON.stringify(DEFAULT_CATS));

async function loadSharedState() {
  try {
    const resp = await fetch(getSheetUrl() + '?action=getState', { method: 'GET' });
    const data = await resp.json();
    if (data.status === 'ok') {
      sharedState.submissions = data.submissions || {};
      // Use shared cats if available
      if (data.cats) {
        CATS = data.cats;
        localStorage.setItem('kims_cats', JSON.stringify(data.cats)); // cache locally
      } else {
        // Try local cache
        const local = localStorage.getItem('kims_cats');
        if (local) CATS = JSON.parse(local);
      }
    }
  } catch(e) {
    // Fall back to local cache
    try {
      const local = localStorage.getItem('kims_cats');
      if (local) CATS = JSON.parse(local);
    } catch(e2) {}
    // Fall back to local submission flags
    try {
      const local = JSON.parse(localStorage.getItem('kims_submitted') || '{}');
      sharedState.submissions = local;
    } catch(e2) {}
  }
  sharedState.loaded = true;
}

/* check shared + local */
function isSubmitted(type, partId, date) {
  try {
    if (sharedState.submissions[date]?.[type]?.[partId]) return true;
  } catch(e) {}
  try {
    const d = JSON.parse(localStorage.getItem('kims_submitted') || '{}');
    return !!(d[date]?.[type]?.[partId]);
  } catch(e) { return false; }
}

function markSubmitted(type, partId, date) {
  // Update shared state in memory
  if (!sharedState.submissions[date]) sharedState.submissions[date] = {};
  if (!sharedState.submissions[date][type]) sharedState.submissions[date][type] = {};
  sharedState.submissions[date][type][partId] = true;
  // Also save locally as backup
  let d = {};
  try { d = JSON.parse(localStorage.getItem('kims_submitted') || '{}'); } catch(e) {}
  if (!d[date]) d[date] = {};
  if (!d[date][type]) d[date][type] = {};
  d[date][type][partId] = true;
  localStorage.setItem('kims_submitted', JSON.stringify(d));
}

/* ══════════════════════════════════
   LOCAL STORAGE (records)
══════════════════════════════════ */
function saveRecord(rec) {
  let recs = [];
  try { recs = JSON.parse(localStorage.getItem('kims_records') || '[]'); } catch(e) {}
  recs.unshift(rec);
  if (recs.length > 100) recs = recs.slice(0, 100);
  try { localStorage.setItem('kims_records', JSON.stringify(recs)); } catch(e) {
    // storage full: keep recent 30
    try { localStorage.setItem('kims_records', JSON.stringify(recs.slice(0,30))); } catch(e2) {}
  }
}
function loadRecords() {
  try { return JSON.parse(localStorage.getItem('kims_records') || '[]'); } catch(e) { return []; }
}
function loadAdminPwd() { return localStorage.getItem('kims_admin_pwd') || '1234'; }

/* ══════════════════════════════════
   IMAGE COMPRESS
══════════════════════════════════ */
function compressImage(dataUrl, maxW, maxH, q, cb) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(c.toDataURL('image/jpeg', q));
  };
  img.src = dataUrl;
}

      <span class="cat-hdr-name">${cat.name}</span>

    cat.items.forEach((item, idx) => {

      html += `<div class="check-item${ans?' st-'+ans:''}" id="ci_${key}">

          <button class="bst${ans==='bad'?' sel-bad':''}" onclick="setAns('${key}','bad')">❌ 불량</button>
          <button class="bst memo-btn" onclick="toggleMemo('${key}')">✏️</button>
        </div>
        <textarea class="memo-area${memo?' show':''}" id="memo_${key}" rows="2"

      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('mainArea').innerHTML = html;
  document.getElementById('bottomInner').innerHTML = `
    <button class="btn-sub" onclick="goHome()">← 뒤로</button>
    <button class="btn-main" onclick="S.mode='am-report';render()">점검 완료 →</button>`;

function setAns(key, val) {
  S.ans[key] = S.ans[key]===val ? '' : val;
  const ci = document.getElementById('ci_'+key); if (!ci) return;
  const a = S.ans[key];
  ci.className = 'check-item' + (a ? ' st-'+a : '');
  ci.querySelectorAll('.bst:not(.memo-btn)').forEach((b,i) => {
    b.className = 'bst' + (a===['good','warn','bad'][i] ? ' sel-'+['good','warn','bad'][i] : '');
  });
  updateProgress();
}
function toggleMemo(key) {
  const ta = document.getElementById('memo_'+key); if (!ta) return;
  ta.classList.toggle('show'); if (ta.classList.contains('show')) ta.focus();
}

/* ══════════════════════════════════
   MORNING REPORT
══════════════════════════════════ */
function renderAmReport() {
  const part = AM_PARTS.find(p => p.id===S.part);
  document.getElementById('hdrInfo').innerHTML = `<strong>점검 결과</strong>${S.date}`;
  let good=0, warn=0, bad=0, na=0;
  const issues=[], warnItems=[];
  const catScores={};
  getCats().forEach(catId => {
    const cat=CATS[catId]; let cg=0, cna=0;
    cat.items.forEach((item, idx) => {
      const a = S.ans[catId+'_'+idx];
      if (a==='good'){good++;cg++;}
      else if (a==='warn'){warn++;warnItems.push({cat:cat.name,q:item,memo:S.memo[catId+'_'+idx]||''});}
      else if (a==='bad'){bad++;issues.push({cat:cat.name,q:item,memo:S.memo[catId+'_'+idx]||''});}
      else {na++;cna++;}
    });
    catScores[catId] = {name:cat.name,icon:cat.icon,pct:Math.round(cg/(cat.items.length-cna||1)*100)};
  });
  const eff=totalItems()-na;
  const score=eff>0?Math.round(good/eff*100):100;
  const grade=score>=90?'A등급 · 우수':score>=75?'B등급 · 양호':score>=60?'C등급 · 보통':'D등급 · 개선필요';
  const sc=score>=90?'#1E8449':score>=75?'#2471A3':score>=60?'#B7770D':'#C0392B';
  let issHtml='';
  if (issues.length) issHtml+=`<div class="rpt-card"><div class="rpt-card-title">불량 항목 (${issues.length}건)</div>
    <ul class="issue-list">${issues.map(i=>`<li><span class="issue-tag">${i.cat}</span>
      <div><div class="issue-text">${i.q}</div>${i.memo?`<div class="issue-memo">↳ ${i.memo}</div>`:''}</div></li>`).join('')}</ul></div>`;
  if (warnItems.length) issHtml+=`<div class="rpt-card"><div class="rpt-card-title">주의 항목 (${warnItems.length}건)</div>
    <ul class="issue-list">${warnItems.map(i=>`<li style="background:#FEF5E4;border-left-color:#F39C12">
      <span class="issue-tag" style="background:#F39C12">${i.cat}</span>
      <div><div class="issue-text">${i.q}</div>${i.memo?`<div class="issue-memo">↳ ${i.memo}</div>`:''}</div></li>`).join('')}</ul></div>`;
  if (!issues.length&&!warn) issHtml=`<div class="rpt-card"><div class="all-good">
    <div class="all-good-icon">🎉</div><div class="all-good-text">전 항목 양호</div>
    <div class="all-good-sub">오늘 오전 점검 수고하셨습니다!</div></div></div>`;
  document.getElementById('mainArea').innerHTML=`
    <div class="step-tag">오전 점검 결과</div>
    <h1 class="step-title" style="margin-bottom:2px">${S.name} · ${part.name}</h1>
    <p class="step-sub">${S.date} · 야탑점 킴스클럽</p>
    <div class="submit-box" id="submitBox"><div class="submit-icon" id="submitIcon"></div>
      <div class="submit-msg" id="submitMsg"></div><div class="submit-sub" id="submitSub"></div></div>
    <div class="rpt-card"><div class="score-disp">
      <div class="score-num" style="color:${sc}">${score}점</div><div class="score-grade">${grade}</div></div>
      <div class="ov-grid">
        <div class="ov-cell"><div class="ov-val good">${good}</div><div class="ov-label">양호</div></div>
        <div class="ov-cell"><div class="ov-val warn">${warn}</div><div class="ov-label">주의</div></div>
        <div class="ov-cell"><div class="ov-val bad">${bad}</div><div class="ov-label">불량</div></div>
      </div></div>
    <div class="rpt-card"><div class="rpt-card-title">파트별 점수</div>
      ${getCats().map(c => {const cs=catScores[c];const fc=cs.pct>=90?'#27AE60':cs.pct>=70?'#F39C12':'#E74C3C';
        return`<div class="cs-row"><div class="cs-name">${cs.icon} ${cs.name}</div>
          <div class="cs-bar-bg"><div class="cs-bar-fill" style="width:${cs.pct}%;background:${fc}"></div></div>
          <div class="cs-val">${cs.pct}점</div></div>`;}).join('')}</div>
    ${issHtml}`;
  document.getElementById('bottomInner').innerHTML=`
    <button class="btn-sub" onclick="S.mode='am-check';render()">← 수정</button>
    <button class="btn-main" id="submitBtn" onclick="submitMorning()">📤 구글시트 제출</button>`;

        <textarea class="eve-note-ta" rows="2" placeholder="진열 관련 특이사항..."
          onchange="S.eveNotes['${S.eveDept}']=this.value">${esc(note)}</textarea>
      </div>
    </div>`;
  const canSub = photos.length >= MIN_PHOTOS;
  document.getElementById('bottomInner').innerHTML=`
    <button class="btn-sub" onclick="goHome()">← 뒤로</button>
    <button class="btn-main eve" id="eveSubmitBtn" onclick="submitEvening()" ${canSub?'':'disabled'}>
      📤 제출 (${photos.length}/${MIN_PHOTOS}장 이상)
    </button>`;
}
function triggerPhoto(deptId) { const el=document.getElementById('fileInput_'+deptId); if(el)el.click(); }
function handlePhoto(deptId, input) {
  const files=Array.from(input.files);
  const current=S.evePhotos[deptId]||[];
  const toAdd=files.slice(0, MAX_PHOTOS-current.length);
  if (!toAdd.length) return;
  let loaded=0;
  toAdd.forEach(file => {
    const reader=new FileReader();
    reader.onload=e=>{
      compressImage(e.target.result, 900, 900, 0.72, compressed=>{
        S.evePhotos[deptId].push(compressed);
        loaded++;
        if (loaded===toAdd.length) renderEvening();
      });
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}
function delPhoto(deptId, idx) { S.evePhotos[deptId].splice(idx,1); renderEvening(); }

/* ══════════════════════════════════
   SUBMIT - MORNING
══════════════════════════════════ */
function submitMorning() {
  const part = AM_PARTS.find(p => p.id===S.part);
  const rows=[], detItems=[];
  getCats().forEach(catId => {
    CATS[catId].items.forEach((item, idx) => {
      const a = S.ans[catId+'_'+idx] || '';
      const label = a==='good'?'양호':a==='warn'?'주의':a==='bad'?'불량':'미입력';
      rows.push({cat:CATS[catId].name, item, ans:label, memo:S.memo[catId+'_'+idx]||''});
      detItems.push({catId, cat:CATS[catId].name, item, ans:a, memo:S.memo[catId+'_'+idx]||''});
    });
  });
  const good=Object.values(S.ans).filter(v=>v==='good').length;
  const answered=Object.values(S.ans).filter(v=>!!v).length;
  const score=answered>0?Math.round(good/answered*100):100;
  const payload={type:'morning', partId:S.part, date:S.date, name:S.name, part:part.name, score,
    submittedAt:new Date().toLocaleString('ko-KR'), items:rows};
  showSubmit('loading','⏳','전송 중...','구글시트에 기록하고 있습니다');
  document.getElementById('submitBtn').disabled=true;
  markSubmitted('morning', S.part, S.date);
  saveRecord({id:Date.now(),type:'morning',date:S.date,name:S.name,part:S.part,partName:part.name,score,items:detItems,submittedAt:new Date().toLocaleString('ko-KR')});
  sendToSheet(payload, ()=>onAmSuccess(), ()=>onError());
}
function onAmSuccess() {
  showSubmit('ok','✅','제출 완료!','구글시트에 정상적으로 기록되었습니다');
  const btn=document.getElementById('submitBtn');
  if (btn){btn.textContent='✓ 제출 완료';btn.disabled=true;}
  setTimeout(()=>{S.mode='home';S.part=null;S.ans={};S.memo={};render();}, 2500);
}

/* ══════════════════════════════════
   SUBMIT - EVENING
══════════════════════════════════ */
function submitEvening() {
  const dept = EVE_DEPTS.find(d => d.id===S.eveDept);
  const photos = S.evePhotos[S.eveDept] || [];
  if (photos.length < MIN_PHOTOS) { alert(`사진을 최소 ${MIN_PHOTOS}장 이상 업로드해주세요.`); return; }
  const note = S.eveNotes[S.eveDept] || '';
  const payload={type:'evening', deptId:S.eveDept, date:S.date, name:S.name, dept:dept.name,
    photoCount:photos.length, photos:photos, note, submittedAt:new Date().toLocaleString('ko-KR')};
  document.getElementById('eveSubmitBtn').disabled=true;
  document.getElementById('eveSubmitBtn').textContent='📤 업로드 중...';
  markSubmitted('evening', S.eveDept, S.date);
  saveRecord({id:Date.now(),type:'evening',date:S.date,name:S.name,dept:S.eveDept,deptName:dept.name,photoCount:photos.length,photos:[...photos],note,submittedAt:new Date().toLocaleString('ko-KR')});
  sendToSheet(payload, ()=>onEveSuccess(), ()=>{
    document.getElementById('eveSubmitBtn').disabled=false;
    document.getElementById('eveSubmitBtn').textContent=`📤 제출 (${photos.length}/${MIN_PHOTOS}장 이상)`;
    alert('전송 실패. 다시 시도해주세요.');
  });
}
function onEveSuccess() {
  document.getElementById('mainArea').innerHTML=`
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:50px;margin-bottom:16px">📷</div>
      <div style="font-size:18px;font-weight:700;color:#2E4A7A;margin-bottom:8px">저녁장 점검 완료!</div>
      <div style="font-size:13px;color:#888">${EVE_DEPTS.find(d=>d.id===S.eveDept).name} 진열 사진이<br>구글시트에 업로드되었습니다</div>
    </div>`;
  document.getElementById('bottomInner').innerHTML=`<button class="btn-main eve" onclick="goHome()">홈으로 →</button>`;
}

/* ══════════════════════════════════
   NETWORK
══════════════════════════════════ */
function sendToSheet(payload, onOk, onFail) {
  const body = JSON.stringify(payload);
  fetch(getSheetUrl(), {method:'POST', headers:{'Content-Type':'text/plain'}, body})
    .then(r => r.json())
    .then(d => { if (d.status==='ok') onOk(); else throw new Error(d.message||'error'); })
    .catch(() => {
      fetch(getSheetUrl(), {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body})
        .then(() => onOk())
        .catch(() => onFail());
    });
}
function onError() {
  showSubmit('err','❌','전송 실패','네트워크를 확인하고 다시 시도해주세요');
  const btn=document.getElementById('submitBtn');
  if (btn) {btn.textContent='📤 다시 시도';btn.disabled=false;}
}
function showSubmit(type, icon, msg, sub) {
  const box=document.getElementById('submitBox'); if (!box) return;
  box.className='submit-box '+type;
  document.getElementById('submitIcon').textContent=icon;
  document.getElementById('submitMsg').textContent=msg;
  document.getElementById('submitSub').textContent=sub;
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ══════════════════════════════════
   RECORDS LIST
══════════════════════════════════ */
function renderRecords() {
  document.getElementById('hdrInfo').innerHTML='<strong>제출 기록</strong>야탑점';
  const recs = loadRecords();
  if (!recs.length) {
    document.getElementById('mainArea').innerHTML=`<div class="rec-empty">
      <div class="rec-empty-icon">📋</div><div>아직 제출된 기록이 없습니다</div></div>`;
    document.getElementById('bottomInner').innerHTML=`<button class="btn-main" onclick="goHome()">← 홈으로</button>`;
    return;
  }
  const grouped={};
  recs.forEach(r=>{if(!grouped[r.date])grouped[r.date]=[];grouped[r.date].push(r);});
  let html='';
  Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    html+=`<div class="rec-date-group"><div class="rec-date-hdr">${date}</div>`;
    grouped[date].forEach(r=>{
      if (r.type==='morning') {
        const sc=r.score>=90?'good':r.score>=70?'warn':'bad';
        html+=`<div class="rec-item" onclick="viewDetail(${r.id})">
          <div class="rec-item-icon am">${AM_PARTS.find(p=>p.id===r.part)?.icon||'📋'}</div>
          <div class="rec-item-body">
            <div class="rec-item-title">[오전] ${r.partName} 점검</div>
            <div class="rec-item-sub">${r.name} · ${r.submittedAt}</div>
          </div>
          <div class="rec-item-score ${sc}">${r.score}점</div>
          <div class="rec-item-arrow">›</div>
        </div>`;
      } else {
        const dept=EVE_DEPTS.find(d=>d.id===r.dept)||{icon:'📷'};
        html+=`<div class="rec-item" onclick="viewDetail(${r.id})">
          <div class="rec-item-icon pm">${dept.icon}</div>
          <div class="rec-item-body">
            <div class="rec-item-title">[저녁] ${r.deptName} 진열 점검</div>
            <div class="rec-item-sub">${r.name} · 사진 ${r.photoCount}장 · ${r.submittedAt}</div>
          </div>
          <div style="font-size:13px;font-weight:700;color:#2E4A7A;flex-shrink:0">📷${r.photoCount}</div>
          <div class="rec-item-arrow">›</div>
        </div>`;
      }
    });
    html+='</div>';
  });
  document.getElementById('mainArea').innerHTML=html;
  document.getElementById('bottomInner').innerHTML=`<button class="btn-main" onclick="goHome()">← 홈으로</button>`;
}

/* ══════════════════════════════════
   RECORD DETAIL
══════════════════════════════════ */
function viewDetail(id) {
  const rec = loadRecords().find(r=>r.id===id); if (!rec) return;
  S.detailRec=rec; S.mode='rec-detail'; render();
}
function renderRecDetail() {
  const rec=S.detailRec; if (!rec){goRecords();return;}
  if (rec.type==='morning') renderAmDetail(rec);
  else renderEveDetail(rec);
}
function renderAmDetail(rec) {
  const part=AM_PARTS.find(p=>p.id===rec.part)||{icon:'📋'};
  document.getElementById('hdrInfo').innerHTML=`<strong>점검 상세</strong>${rec.date}`;
  const sc=rec.score>=90?'#1E8449':rec.score>=75?'#2471A3':rec.score>=60?'#B7770D':'#C0392B';
  const catMap={};
  (rec.items||[]).forEach(item=>{if(!catMap[item.cat])catMap[item.cat]=[];catMap[item.cat].push(item);});
  let catHtml='';
  Object.entries(catMap).forEach(([catName,items])=>{
    catHtml+=`<div class="rpt-card"><div class="rpt-card-title">${catName}</div>`;
    items.forEach((item,i)=>{
      const al=item.ans==='good'?'양호':item.ans==='warn'?'주의':item.ans==='bad'?'불량':'미입력';
      const ac=item.ans==='good'?'ans-good':item.ans==='warn'?'ans-warn':item.ans==='bad'?'ans-bad':'ans-na';
      catHtml+=`<div class="det-check-row">
        <span class="det-check-num">${i+1}</span>
        <span class="det-check-q">${item.item}</span>
        <span class="det-check-ans ${ac}">${al}</span></div>
      ${item.memo?`<div class="det-check-memo">↳ ${item.memo}</div>`:''}`;
    });
    catHtml+='</div>';
  });
  document.getElementById('mainArea').innerHTML=`
    <div class="step-tag">오전 점검 상세</div>
    <div class="det-hdr">
      <div class="det-hdr-icon">${part.icon}</div>
      <div class="det-hdr-info">
        <div class="det-hdr-title">${rec.name} · ${rec.partName}</div>
        <div class="det-hdr-sub">${rec.date} · ${rec.submittedAt}</div>
      </div>
      <div class="det-score" style="color:${sc}">${rec.score}점</div>
    </div>${catHtml}`;
  document.getElementById('bottomInner').innerHTML=`<button class="btn-main" onclick="S.mode='records';render()">← 목록으로</button>`;
}
function renderEveDetail(rec) {
  const dept=EVE_DEPTS.find(d=>d.id===rec.dept)||{icon:'📷'};
  document.getElementById('hdrInfo').innerHTML=`<strong>진열 사진</strong>${rec.date}`;
  const photos=rec.photos||[];
  const photoHtml=photos.length?`<div class="photo-gallery">${photos.map((p,i)=>
    `<div class="photo-gallery-item" onclick="openLightboxArr(${JSON.stringify(photos)},${i})">
      <img src="${p}" alt="사진${i+1}"></div>`).join('')}</div>`
    :'<div style="color:#aaa;text-align:center;padding:20px;font-size:13px">사진 없음</div>';
  document.getElementById('mainArea').innerHTML=`
    <div class="step-tag">저녁장 진열 점검 상세</div>
    <div class="det-hdr">
      <div class="det-hdr-icon">${dept.icon}</div>
      <div class="det-hdr-info">
        <div class="det-hdr-title">${rec.name} · ${rec.deptName} 진열</div>
        <div class="det-hdr-sub">${rec.date} · ${rec.submittedAt}</div>
      </div>
      <div style="font-size:14px;font-weight:700;color:#2E4A7A">📷 ${photos.length}장</div>
    </div>
    <div class="rpt-card">
      <div class="rpt-card-title">업로드 사진 (${photos.length}장)</div>
      ${photoHtml}
      ${rec.note?`<div style="margin-top:14px;padding-top:12px;border-top:1px solid #F0F0F0">
        <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:5px">특이사항</div>
        <div style="font-size:13px;color:#1A1A1A">${esc(rec.note)}</div></div>`:''}
    </div>`;
  document.getElementById('bottomInner').innerHTML=`<button class="btn-main eve" onclick="S.mode='records';render()">← 목록으로</button>`;
}

/* ══════════════════════════════════
   LIGHTBOX
══════════════════════════════════ */
function openLightboxArr(photos, idx) { lbPhotos=photos; lbIndex=idx; showLightbox(); }
function showLightbox() {
  document.getElementById('lbImg').src=lbPhotos[lbIndex];
  document.getElementById('lbCounter').textContent=(lbIndex+1)+' / '+lbPhotos.length;
  document.getElementById('lightbox').style.display='flex';
  document.body.style.overflow='hidden';
}
function closeLightbox() { document.getElementById('lightbox').style.display='none'; document.body.style.overflow=''; }
function lbPrev() { lbIndex=(lbIndex-1+lbPhotos.length)%lbPhotos.length; showLightbox(); }
function lbNext() { lbIndex=(lbIndex+1)%lbPhotos.length; showLightbox(); }
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});

/* ══════════════════════════════════
   ADMIN
══════════════════════════════════ */
function openAdmin() {
  document.getElementById('adminOverlay').style.display='flex';
  document.body.style.overflow='hidden';
  adminAuthed ? renderAdminPanel() : renderAdminPwd();
}
function saveSheetUrl() {
  var input = document.getElementById('sheetUrlInput');
  if (!input) return;
  var url = input.value.trim();
  if (!url) { alert('URL을 입력해주세요'); return; }
  if (!url.endsWith('/exec')) { alert('URL이 /exec 로 끝나야 합니다'); return; }
  localStorage.setItem('kims_sheet_url', url);
  input.style.borderColor = '#27AE60';
  setTimeout(function(){ input.style.borderColor = ''; }, 1500);
  alert('URL이 저장되었습니다 ✓\n앱을 새로고침해도 유지됩니다.');
}

function closeAdmin() { document.getElementById('adminOverlay').style.display='none'; document.body.style.overflow=''; }
function renderAdminPwd() {
  document.getElementById('adminPanel').innerHTML=`
    <div class="adm-hdr"><div class="adm-title">⚙ 관리자 인증</div>
      <button class="adm-close" onclick="closeAdmin()">닫기</button></div>
    <div class="pwd-screen">
      <div class="pwd-title">관리자 비밀번호</div>
      <div class="pwd-sub">비밀번호 입력 (기본: 1234)</div>
      <input class="pwd-input" type="password" id="pwdInput" maxlength="10"
        placeholder="••••" onkeydown="if(event.key==='Enter')checkPwd()">
      <div class="pwd-err" id="pwdErr">비밀번호가 틀렸습니다</div>
      <button class="btn-pwd" onclick="checkPwd()">확인</button>
    </div>`;
  setTimeout(()=>{const i=document.getElementById('pwdInput');if(i)i.focus();},100);
}
function checkPwd() {
  const val=document.getElementById('pwdInput').value;
  if (val===loadAdminPwd()){adminAuthed=true;renderAdminPanel();}
  else{document.getElementById('pwdErr').className='pwd-err show';document.getElementById('pwdInput').value='';}
}
function renderAdminPanel() {
  editCats=JSON.parse(JSON.stringify(CATS));
  const catHtml=Object.keys(editCats).map(catId=>{
    const cat=editCats[catId];
    const itemsHtml=cat.items.map((item,idx)=>`
      <div class="adm-item-row">
        <input class="adm-item-input" type="text" value="${esc(item)}"
          onchange="editCats['${catId}'].items[${idx}]=this.value">
        <button class="btn-del" onclick="delItem('${catId}',${idx})">✕</button>
      </div>`).join('');
    return `<div class="adm-cat">
      <div class="adm-cat-hdr"><span style="font-size:18px">${cat.icon}</span>
        <span class="adm-cat-name">${cat.name}</span></div>
      <div id="items_${catId}">${itemsHtml}</div>
      <button class="btn-add-item" onclick="addItem('${catId}')">+ 항목 추가</button>
    </div>`;
  }).join('');
  document.getElementById('adminPanel').innerHTML=`
    <div class="adm-hdr"><div class="adm-title">⚙ 점검 항목 관리</div>
      <button class="adm-close" onclick="closeAdmin()">닫기</button></div>
    <div class="adm-body">
      <div class="adm-sec-title" style="margin-bottom:12px">🔗 구글시트 연동 URL</div>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <input id="sheetUrlInput" type="url" placeholder="https://script.google.com/macros/s/.../exec"
          style="flex:1;height:40px;background:#FFF;border:1px solid #D0CFC9;border-radius:8px;padding:0 12px;font-family:inherit;font-size:13px;color:#1A1A1A;outline:none"
          value="">
        <button onclick="saveSheetUrl()" style="height:40px;padding:0 16px;background:#1A2535;color:#FFF;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">저장</button>
      </div>
      <div style="font-size:11px;color:#888;margin-bottom:20px">Apps Script [새 배포] 후 받은 URL 입력. /exec 로 끝나야 합니다.</div>
      <div class="adm-sec-title">📝 오전 점검 항목 수정</div>
      ${catHtml}
      <div style="height:60px"></div>
    </div>
    <div class="adm-save-bar">
      <button class="btn-adm-save" onclick="saveAdminItems()">✓ 전체 기기에 저장</button>
    </div>`;
}
function addItem(catId) {
  editCats[catId].items.push('');
  const idx=editCats[catId].items.length-1;
  const row=document.createElement('div');
  row.className='adm-item-row';
  row.innerHTML=`<input class="adm-item-input" type="text" placeholder="항목 내용 입력"
    onchange="editCats['${catId}'].items[${idx}]=this.value">
    <button class="btn-del" onclick="delItem('${catId}',${idx})">✕</button>`;
  document.getElementById('items_'+catId).appendChild(row);
  row.querySelector('input').focus();
}
function delItem(catId, idx) {
  editCats[catId].items.splice(idx,1);
  document.getElementById('items_'+catId).innerHTML=editCats[catId].items.map((item,i)=>`
    <div class="adm-item-row"><input class="adm-item-input" type="text" value="${esc(item)}"
      onchange="editCats['${catId}'].items[${i}]=this.value">
      <button class="btn-del" onclick="delItem('${catId}',${i})">✕</button></div>`).join('');
}
function saveAdminItems() {
  Object.keys(editCats).forEach(catId=>{
    document.querySelectorAll(`#items_${catId} input`).forEach((inp,i)=>{editCats[catId].items[i]=inp.value.trim();});
    editCats[catId].items=editCats[catId].items.filter(v=>v!=='');
  });
  CATS=JSON.parse(JSON.stringify(editCats));
  // Save locally as cache
  localStorage.setItem('kims_cats', JSON.stringify(CATS));
  // Save to server (shared across all devices)
  fetch(getSheetUrl(), {method:'POST', headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({type:'save_cats', cats:CATS})})
  .catch(()=>{
    fetch(getSheetUrl(), {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({type:'save_cats', cats:CATS})}).catch(()=>{});
  });
  closeAdmin(); render();
  alert('저장되었습니다! 모든 기기에 적용됩니다 ✓');
}

   INIT
══════════════════════════════════ */
render(); // show loading
loadSharedState().then(()=>{
  S.mode='home';
  render();
});
